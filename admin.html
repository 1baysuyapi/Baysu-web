<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAYRAKÇI YAPI - Yönetici Kayıt Paneli</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0F172A; color: #F8FAFC; margin: 0; padding: 20px; }
        .admin-card { max-width: 900px; margin: 40px auto; background: #1E293B; border-radius: 16px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid #334155; }
        h2 { color: #38BDF8; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 25px 0; }
        .stat-box { background: #0F172A; padding: 20px; border-radius: 12px; border: 1px solid #334155; text-align: center; }
        .stat-number { font-size: 28px; font-weight: 700; color: #38BDF8; }
        .stat-label { font-size: 13px; color: #94A3B8; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #0F172A; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #334155; font-size: 14px; }
        th { background: #1E293B; color: #94A3B8; }
        .login-box { max-width: 400px; margin: 100px auto; background: #1E293B; padding: 30px; border-radius: 16px; border: 1px solid #334155; text-align: center; }
        input[type="password"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0F172A; color: #fff; margin: 15px 0; box-sizing: border-box; }
        button { background: #38BDF8; color: #0F172A; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; }
        button:hover { background: #0EA5E9; }
    </style>
</head>
<body>

<div id="loginArea" class="login-box">
    <h2><i class="fas fa-user-shield"></i> Yönetici Girişi</h2>
    <p style="color: #94A3B8; font-size: 13px;">Ziyaretçi ve erişim kayıtlarını görmek için şifrenizi giriniz.</p>
    <input type="password" id="adminPass" placeholder="Yönetici Şifresi">
    <button onclick="checkAdmin()">Giriş Yap</button>
    <p id="loginErr" style="color: #EF4444; font-size: 13px; display: none; margin-top: 10px;">Hatalı şifre!</p>
</div>

<div id="adminDashboard" class="admin-card" style="display: none;">
    <h2><i class="fas fa-chart-line"></i> Ziyaretçi & İnceleme Kayıt Paneli</h2>
    
    <div class="stats-grid">
        <div class="stat-box">
            <div class="stat-number" id="totalVisits">0</div>
            <div class="stat-label">Toplam Sayfa Görüntüleme</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="uniqueVisits">0</div>
            <div class="stat-label">Oturum Sayısı</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="lastAccess">-</div>
            <div class="stat-label">Son Ziyaret Tarihi</div>
        </div>
    </div>

    <h3><i class="fas fa-history"></i> Son Ziyaret Günlükleri</h3>
    <table>
        <thead>
            <tr>
                <th>Tarih / Saat</th>
                <th>Ziyaret Edilen Sayfa</th>
                <th>Cihaz</th>
            </tr>
        </thead>
        <tbody id="logTable">
            <tr><td colspan="3" style="text-align: center; color: #94A3B8;">Kayıt bulunamadı.</td></tr>
        </tbody>
    </table>
    <br>
    <button onclick="clearLogs()" style="background: #EF4444; color: #fff; width: auto;">Kayıtları Temizle</button>
</div>

<script>
    function checkAdmin() {
        var pass = document.getElementById('adminPass').value;
        if (pass === 'baysu2026' || pass === 'admin') {
            document.getElementById('loginArea').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
            loadLogs();
        } else {
            document.getElementById('loginErr').style.display = 'block';
        }
    }

    function loadLogs() {
        var logs = JSON.parse(localStorage.getItem('baysu_visitor_logs') || '[]');
        document.getElementById('totalVisits').textContent = logs.length;
        
        var sessions = new Set(logs.map(function(l){ return l.session; })).size;
        document.getElementById('uniqueVisits').textContent = sessions || (logs.length > 0 ? 1 : 0);

        if (logs.length > 0) {
            document.getElementById('lastAccess').textContent = logs[logs.length - 1].time;
        }

        var tbody = document.getElementById('logTable');
        if (logs.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #94A3B8;">Kayıt bulunamadı.</td></tr>';
            return;
        }

        var html = '';
        for (var i = logs.length - 1; i >= Math.max(0, logs.length - 50); i--) {
            var item = logs[i];
            html += '<tr>' +
                '<td>' + item.time + '</td>' +
                '<td><strong>' + item.page + '</strong></td>' +
                '<td>' + item.agent + '</td>' +
                '</tr>';
        }
        tbody.innerHTML = html;
    }

    function clearLogs() {
        if (confirm('Tüm ziyaret kayıtları silinecek. Onaylıyor musunuz?')) {
            localStorage.removeItem('baysu_visitor_logs');
            loadLogs();
        }
    }
</script>
</body>
</html>
